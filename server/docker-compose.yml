version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: jp_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-japanese_immersion_hub}
      POSTGRES_USER: ${POSTGRES_USER:-jhub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jhub123}
      PGDATA: /var/lib/postgresql/data/pgdata
      TZ: Asia/Ho_Chi_Minh
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./src/main/resources/db/init:/docker-entrypoint-initdb.d
    networks:
      - jhub_network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-jhub} -d ${POSTGRES_DB:-japanese_immersion_hub}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: jp_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@jhub.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin123}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - jhub_network
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pg_data:
    driver: local
  pgadmin_data:
    driver: local

networks:
  jhub_network:
    driver: bridge
